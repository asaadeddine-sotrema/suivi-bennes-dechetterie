version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: sotrema_bennes
      POSTGRES_USER: sotrema
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Pas de port publié : PostgreSQL n'est joignable que sur le réseau Docker interne.
    # Pour un accès local ponctuel : `make shell-db`, ou ré-ajouter "127.0.0.1:5433:5432".
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sotrema"]
      interval: 10s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    # Pas de port publié : l'API n'est accessible que via le proxy nginx (/api).
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    environment:
      - VITE_API_URL=http://backend:8000
    depends_on:
      - backend

volumes:
  postgres_data:
