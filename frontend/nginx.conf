# Limitation de débit sur l'API (protection anti-abus / déni de service léger)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

# Redirection de tout le trafic HTTP vers HTTPS.
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Certificat TLS (monté en volume : privkey hors image, rotation sans rebuild).
    ssl_certificate     /etc/nginx/tls/fullchain.pem;
    ssl_certificate_key /etc/nginx/tls/privkey.pem;

    # Durcissement TLS : protocoles récents uniquement, reprise de session.
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    client_max_body_size 50M;
    limit_req_status 429;

    # En-têtes de sécurité (appliqués même aux réponses d'erreur)
    # HSTS : À N'ACTIVER qu'avec un certificat approuvé (AC interne / public).
    # Avec un certificat auto-signé, HSTS rend l'avertissement du navigateur
    # non contournable et bloquerait l'accès. Décommenter après bascule.
    # add_header Strict-Transport-Security "max-age=15552000" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self'; font-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; upgrade-insecure-requests" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
